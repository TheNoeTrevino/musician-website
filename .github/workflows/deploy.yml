name: Deploy Prod - Pi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # build
      - name: Pull Latest Code
        run: |
          cd /home/noetrevino/projects/sebastian-website
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}

      - name: Build Frontend
        run: |
          set -a && source /opt/sebastian/prod/.env && set +a
          cd /home/noetrevino/projects/sebastian-website/frontend
          npm ci
          npm run build -- --outDir dist-new
          rm -rf dist
          mv dist-new dist

      - name: Build Java Service
        run: |
          cd /home/noetrevino/projects/sebastian-website/backend
          ./gradlew bootJar

      - name: Deploy JAR to Production
        run: |
          cp /home/noetrevino/projects/sebastian-website/backend/build/libs/sebastian-api.jar /opt/sebastian/prod/sebastian-api.jar

      # deploy
      - name: Restart Services
        run: |
          sudo systemctl restart sebastian-api

      - name: Sync Frontend Files to Reverse Proxy
        run: |
          rsync -avz --delete /home/noetrevino/projects/sebastian-website/frontend/dist/ reverse-proxy:/var/www/sebastian/

      - name: Health Check
        run: |
          sleep 5
          curl -f http://localhost:8081/api/health || echo "API health check"
